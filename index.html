<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Pytlik</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0a' width='100' height='100'/><text y='70' x='50' text-anchor='middle' font-size='60' font-family='Georgia' fill='%23e8e8e8'>M</text></svg>">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VHJRBXJ5ZV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-VHJRBXJ5ZV');
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      line-height: 1.5;
      min-height: 100vh;
      padding: 3rem;
      display: flex;
      flex-direction: column;
    }
    ::selection { background: #e8e8e8; color: #0a0a0a; }
    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 232, 232, 0.4);
      transition: border-color 0.2s;
    }
    a:hover { border-color: #e8e8e8; }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 1400px;
      width: 100%;
    }
    .intro { margin-bottom: 4rem; }
    .intro h1 {
      font-size: clamp(1.25rem, 3.5vw, 2rem);
      font-weight: 300;
      line-height: 1.3;
      max-width: 720px;
      margin-bottom: 0;
      letter-spacing: -0.01em;
    }
    .intro h1 strong { font-weight: 500; }
    .bio-section {
      display: flex;
      gap: 2.5rem;
      align-items: stretch;
      margin-bottom: 3rem;
    }
    .bio-section .carousel {
      flex-shrink: 0;
      margin-top: 0;
      aspect-ratio: unset;
      width: 184px;
      max-width: 184px;
    }
    .bio-wrapper { flex: 1; }
    .bio {
      font-size: 1rem;
      line-height: 1.5;
      max-width: 100%;
      opacity: 0.85;
      font-weight: 300;
    }
    .bio a { border-bottom: 1px solid rgba(232, 232, 232, 0.4); }
    .bio a:hover { border-color: #e8e8e8; }
    .content {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem 6rem;
      font-size: 0.875rem;
      align-items: start;
    }
    @media (max-width: 650px) {
      body { padding: 1.5rem; }
      .content { grid-template-columns: 1fr; }
      .bio-section {
        flex-direction: column;
        gap: 2.5rem;
      }
      .bio-section .carousel {
        width: 65%;
        max-width: 65%;
        aspect-ratio: 1;
        height: auto;
        margin: 0 auto;
      }
      .intro h1 { font-size: 1.875rem; }
    }
    .section-title {
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      opacity: 0.4;
      font-weight: 500;
    }
    .section ul { list-style: none; }
    .section li { margin-bottom: 0.25rem; }
    .section-blurb {
      font-size: 0.8125rem;
      line-height: 1.6;
      opacity: 0.65;
      margin-bottom: 1.25rem;
      font-weight: 300;
    }
    .carousel {
      position: relative;
      width: 100%;
      max-width: 184px;
      aspect-ratio: 1;
      overflow: hidden;
      margin-top: 1.5rem;
      border-radius: 6px;
    }
    .carousel-slide {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      transition: opacity 1s ease;
    }
    .carousel-slide.active { opacity: 1; }
    .carousel-slide img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .role-company { font-weight: 500; }
    .role-title { opacity: 0.6; font-weight: 300; }
    .role-location, .role-dates { font-size: 0.75rem; opacity: 0.4; font-weight: 300; }
    .role-blurb {
      font-size: 0.8125rem;
      line-height: 1.6;
      opacity: 0.65;
      margin-top: 0.85rem;
      font-weight: 300;
    }
    .role-item { margin-bottom: 2rem; }
    .role-item:last-child { margin-bottom: 0; }
    .arrow-link::after { content: ' ↗'; font-size: 0.7em; opacity: 0.4; }
    .footer {
      margin-top: auto;
      padding-top: 4rem;
      font-size: 0.8125rem;
      color: rgba(232, 232, 232, 0.65);
      font-weight: 300;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .intro { animation: fadeIn 0.6s ease both; }
    .content { animation: fadeIn 0.6s ease 0.15s both; }
    #writing-list { font-size: 0.8125rem; }
    .loading { opacity: 0.5; }
    .error { color: #ff6b6b; font-size: 1rem; }
  </style>
</head>
<body>
  <main>
    <header class="intro">
      <h1 id="headline"><span class="loading">Loading...</span></h1>
    </header>
    <div class="bio-section">
      <div class="carousel" id="photo-carousel"></div>
      <div class="bio-wrapper">
        <p class="section-title" id="header-about" style="margin-bottom: 0.75rem;">About Me</p>
        <div class="bio" id="bio"></div>
      </div>
    </div>
    <div class="content">
      <div class="section">
        <p class="section-title" id="header-roles">Career</p>
        <div id="roles-list"></div>
      </div>
      <div class="section">
        <p class="section-title" id="header-contact">Contact</p>
        <ul id="contact-list"></ul>
        <p class="footer" id="footer" style="margin-top: 1.5rem; padding-top: 0;"></p>
        <p class="section-title" id="header-writing" style="margin-top: 2rem;">Writing</p>
        <p class="section-blurb" id="writing-blurb"></p>
        <p class="section-title" id="header-selected-work" style="margin-top: 1.25rem;">Selected Work</p>
        <ul id="writing-list"></ul>
      </div>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSewhOf4l1C8jkHM68rsfVvADuWdvg-kwLFBQOuDs_sPIm-t7S_EgvbnOW1Bps1Wy-FBjC2DW0RB9QP/pub?output=csv&cachebust=' + Date.now();
    let data = {};

    function convertDriveUrl(url) {
      if (!url) return '';
      const match = url.match(/drive\.google\.com\/file\/d\/([^\/]+)/);
      if (match) return 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w1000';
      const match2 = url.match(/drive\.google\.com\/open\?id=([^&]+)/);
      if (match2) return 'https://drive.google.com/thumbnail?id=' + match2[1] + '&sz=w1000';
      return url;
    }

    function parseLinks(text) {
      if (!text) return '';
      let result = text.replace(/\[([^\]]+)\]\s*\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      result = result.replace(/\{([^>]+)>>>([^}]+)\}/g, '<a href="$2" target="_blank">$1</a>');
      return result;
    }

    Papa.parse(SHEET_URL, {
      download: true,
      header: false,
      complete: function(results) {
        results.data.forEach(row => {
          if (row[0] && row[0].toLowerCase() !== 'key' && !row[0].startsWith('—')) {
            data[row[0]] = row[1] || '';
          }
        });
        renderSite();
      },
      error: function(error) {
        document.getElementById('headline').innerHTML = '<span class="error">Error loading content: ' + error.message + '</span>';
      }
    });

    function renderSite() {
      const headline = data.headline || '';
      const linkText = data.link_text || '';
      document.getElementById('headline').innerHTML = linkText
        ? headline.replace(linkText, `<strong>${linkText}</strong>`)
        : headline;

      if (data.bio) {
        document.getElementById('bio').innerHTML = parseLinks(data.bio);
      }

      document.getElementById('contact-list').innerHTML = `
        <li><a href="mailto:${data.email || ''}" class="arrow-link">Email</a></li>
        <li><a href="https://${data.linkedin || ''}" target="_blank" class="arrow-link">LinkedIn</a></li>
      `;

      const photos = Object.keys(data)
        .filter(k => k.startsWith('photo_') && data[k] && !data[k].includes('PASTE'))
        .sort()
        .map(k => convertDriveUrl(data[k]));
      if (photos.length) {
        document.getElementById('photo-carousel').innerHTML = photos.map((url, i) =>
          `<div class="carousel-slide ${i === 0 ? 'active' : ''}"><img src="${url}" alt="" referrerpolicy="no-referrer"></div>`
        ).join('');
        startPhotoCarousel();
      }

      const roleKeys = Object.keys(data).filter(k => /^role_\d+$/.test(k)).sort();
      document.getElementById('roles-list').innerHTML = roleKeys.map(key => {
        const [company, title, location, dates] = data[key].split(' | ');
        const blurb = data[key + '_blurb'] || '';
        return `
        <div class="role-item">
          <div class="role-company">${company || ''}</div>
          <div class="role-title">${title || ''}</div>
          <div class="role-dates">${dates || ''}${location ? ' (' + location.replace(/ \/ /g, ' · ') + ')' : ''}</div>
          ${blurb ? `<p class="role-blurb">${blurb}</p>` : ''}
        </div>`;
      }).join('');

      if (data.writing_blurb) {
        document.getElementById('writing-blurb').textContent = data.writing_blurb;
      }

      const writings = Object.keys(data)
        .filter(k => /^writing_\d+$/.test(k))
        .sort()
        .map(k => data[k].split(' | '))
        .filter(([title]) => title && !title.includes('Bj') && !title.includes('rupture'));
      document.getElementById('writing-list').innerHTML = writings.map(([title, url]) =>
        `<li><a href="${url || '#'}" target="_blank" class="arrow-link">${title}</a></li>`
      ).join('');

      document.getElementById('footer').textContent = (data.footer || '').replace(' and work', '').replace(/^—\s*/, '');

      if (data.header_roles) document.getElementById('header-roles').textContent = data.header_roles;
      if (data.header_contact) document.getElementById('header-contact').textContent = data.header_contact;
      if (data.header_about) document.getElementById('header-about').textContent = data.header_about;
      if (data.header_writing) document.getElementById('header-writing').textContent = data.header_writing;
      if (data.header_selected_work) document.getElementById('header-selected-work').textContent = data.header_selected_work;
    }

    let photoIndex = 0;
    function startPhotoCarousel() {
      const slides = document.querySelectorAll('.carousel-slide');
      if (slides.length < 2) return;
      setInterval(() => {
        slides.forEach(s => s.classList.remove('active'));
        photoIndex = (photoIndex + 1) % slides.length;
        slides[photoIndex].classList.add('active');
      }, 4000);
    }
  </script>
</body>
</html>
